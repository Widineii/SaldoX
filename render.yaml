services:
  - type: web
    name: fintrack
    env: docker
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: fintrack-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: fintrack-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: fintrack-db
          property: password

databases:
  - name: fintrack-db
    plan: free

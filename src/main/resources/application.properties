spring.application.name=saldox
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:file:./data/fintrack;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${JWT_SECRET:saldox-demo-secret-change-in-production}
app.jwt.expiracao-horas=8
app.demo.enabled=true
app.h2-viewer.enabled=true

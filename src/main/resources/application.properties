spring.application.name=saldox
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:file:./data/fintrack;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

app.jwt.secret=${JWT_SECRET:saldox-demo-secret-change-in-production}
app.jwt.expiracao-horas=8
app.demo.enabled=true
app.h2-viewer.enabled=false

# Opcional: em producao configure SMTP e um remetente valido para recuperacao por email
app.mail.from=${MAIL_FROM:${APP_MAIL_FROM:}}
app.recuperacao.exibir-codigo-quando-sem-smtp=${EXIBIR_CODIGO_RECUP_SEM_SMTP:true}
